services:
  db:
    image: postgres:16
    container_name: marketplace_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - marketplace_pgdata:/var/lib/postgresql/data

volumes:
  marketplace_pgdata: